<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضفضة PRO - تجربة الألعاب القصوى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --gold: #fbbf24;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f172a; /* Dark gaming background */
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none;
        }

        /* Gaming Animated Background */
        .game-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--d) infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Wheel Physics & Neon */
        .wheel-neon {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4), inset 0 0 15px rgba(99, 102, 241, 0.3);
        }
        #wheel-canvas {
            transition: transform 5s cubic-bezier(0.2, 0, 0.1, 1);
        }

        /* Overdrive / Fire Mode */
        .on-fire {
            animation: fire-glow 0.8s infinite alternate;
            border-color: var(--accent) !important;
        }
        @keyframes fire-glow {
            from { box-shadow: 0 0 10px #f43f5e; }
            to { box-shadow: 0 0 30px #e11d48, 0 0 10px #fb7185; }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-game {
            background: linear-gradient(180deg, var(--primary) 0%, #4338ca 100%);
            box-shadow: 0 4px 0 #312e81;
            transition: all 0.1s;
        }
        .btn-game:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #312e81;
        }

        /* Podium Layout */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1rem;
            height: 200px;
        }
        .podium-pillar {
            width: 80px;
            border-radius: 10px 10px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            font-weight: 900;
            color: white;
        }
        .pillar-1 { height: 100%; background: linear-gradient(#fbbf24, #b45309); }
        .pillar-2 { height: 75%; background: linear-gradient(#94a3b8, #475569); }
        .pillar-3 { height: 50%; background: linear-gradient(#cd7f32, #78350f); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="game-bg" id="star-field"></div>

    <!-- Top UI: Scores & Settings -->
    <div class="w-full max-w-4xl flex justify-between items-start z-10 mb-4">
        <button onclick="toggleSettings()" class="glass-panel p-3 rounded-2xl border-white/20 hover:bg-white/10 transition">⚙️</button>
        <div id="mini-leaderboard" class="flex gap-2 overflow-x-auto no-scrollbar max-w-[70%] py-1">
            <!-- Dynamic Players -->
        </div>
    </div>

    <!-- Main Game Container -->
    <main id="app" class="w-full max-w-2xl flex-grow flex flex-col items-center justify-center z-10 relative">
        
        <!-- START SCREEN -->
        <div id="screen-start" class="text-center space-y-10 animate-fade-in">
            <div class="relative inline-block">
                <h1 class="text-7xl font-black text-white italic tracking-tighter italic">فضفضة <span class="text-indigo-500">PRO</span></h1>
                <div class="absolute -top-6 -right-10 bg-rose-500 text-[10px] font-bold px-2 py-1 rounded-full uppercase animate-bounce">New Update</div>
            </div>
            
            <div id="player-setup-box" class="glass-panel p-8 rounded-[2.5rem] space-y-6 w-full max-w-md mx-auto">
                <p class="text-indigo-300 font-bold">ضيف اللعيبة عشان التحدي يبدأ</p>
                <div id="player-list-setup" class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" placeholder="اسم اللاعب 1" class="player-input w-full bg-slate-800/50 p-4 rounded-2xl border border-white/10 outline-none focus:border-indigo-500 font-bold text-center">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" placeholder="اسم اللاعب 2" class="player-input w-full bg-slate-800/50 p-4 rounded-2xl border border-white/10 outline-none focus:border-indigo-500 font-bold text-center">
                    </div>
                </div>
                <button onclick="addInput()" class="text-indigo-400 text-sm font-bold">+ لاعب كمان</button>
                <button onclick="startGame()" class="btn-game w-full py-5 rounded-3xl text-2xl font-black shadow-lg">إدخـول الحلبة 🏁</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="screen-game" class="hidden w-full space-y-8 animate-fade-in text-center">
            <div class="space-y-1">
                <div id="turn-display" class="text-indigo-400 font-black text-sm uppercase tracking-widest">الدور على</div>
                <h2 id="current-player-name" class="text-4xl font-black text-white">...</h2>
            </div>

            <div class="relative flex justify-center py-4">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-10 bg-rose-500 pointer-events-none z-30" style="clip-path: polygon(100% 0, 0 0, 50% 100%);"></div>
                <div class="wheel-container wheel-neon rounded-full p-2 bg-indigo-500/10">
                    <canvas id="wheel-canvas" width="800" height="800" class="w-[320px] h-[320px] md:w-[400px] md:h-[400px]"></canvas>
                </div>
            </div>

            <button id="spin-btn" onclick="spinWheel()" class="btn-game w-full max-w-sm py-5 rounded-3xl text-2xl font-black">لـف العجلة 🎡</button>
            
            <div class="glass-panel p-4 rounded-2xl text-xs text-slate-400 font-bold h-20 overflow-y-auto no-scrollbar italic" id="game-log">
                <div>اللعبة بدأت.. يا ترى مين اللي قلبه جاحد؟</div>
            </div>
        </div>

        <!-- QUESTION OVERLAY -->
        <div id="question-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
            <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-xl"></div>
            <div id="q-card" class="relative glass-panel rounded-[3.5rem] p-10 md:p-14 w-full max-w-lg text-center space-y-8 scale-90 transition-all duration-300">
                
                <div id="q-timer" class="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 rounded-full bg-white text-slate-900 flex items-center justify-center text-4xl font-black shadow-2xl border-4 border-indigo-500">30</div>
                
                <div class="space-y-2 pt-6">
                    <span id="q-points" class="bg-gold text-slate-900 px-4 py-1 rounded-full font-black text-xs">50ن</span>
                    <p id="q-text" class="text-2xl md:text-3xl font-black leading-snug">...</p>
                </div>

                <!-- Powers -->
                <div class="flex gap-3 justify-center">
                    <button onclick="usePower('double')" id="p-double" class="flex-1 p-3 rounded-2xl bg-indigo-500/20 border border-indigo-500/30 font-bold text-xs hover:bg-indigo-500/40 transition">⚡ دبل سكور</button>
                    <button onclick="usePower('shield')" id="p-shield" class="flex-1 p-3 rounded-2xl bg-emerald-500/20 border border-emerald-500/30 font-bold text-xs hover:bg-emerald-500/40 transition">🛡️ درع حماية</button>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <button onclick="handleAction(true)" class="btn-game py-6 rounded-3xl text-2xl font-black bg-emerald-600">جاوبت بصراحة ✅</button>
                    <button onclick="handleAction(false)" class="py-4 rounded-2xl bg-white/5 border border-white/10 font-bold text-rose-400 hover:bg-white/10 transition">مش قادر أجاوب (تحدي) 👺</button>
                </div>
            </div>
        </div>

        <!-- DARE MODAL -->
        <div id="modal-dare" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
            <div class="absolute inset-0 bg-rose-950/95 backdrop-blur-md"></div>
            <div class="glass-panel p-10 rounded-[3rem] border-rose-500/50 max-w-sm w-full text-center space-y-6 animate-fade-in">
                <div class="text-7xl">👺</div>
                <h3 class="text-2xl font-black text-rose-500">عقاب الهروب!</h3>
                <p id="dare-text" class="text-xl font-bold italic leading-relaxed">...</p>
                <button onclick="closeDare()" class="btn-game w-full py-5 rounded-2xl bg-rose-600 border-rose-800 font-black">عملته خلاص 😭</button>
            </div>
        </div>

        <!-- FINAL PODIUM SCREEN -->
        <div id="screen-final" class="hidden w-full space-y-10 animate-fade-in">
            <div class="glass-panel p-10 rounded-[4rem] text-center space-y-8">
                <h2 class="text-4xl font-black italic">منصة الأساطير 🏆</h2>
                <div id="podium-area" class="podium-container">
                    <!-- Podium elements -->
                </div>
                <div id="other-rankings" class="space-y-3 pt-6 border-t border-white/10"></div>
                <button onclick="location.reload()" class="btn-game w-full py-5 rounded-3xl font-black">لعبة جديدة 🔄</button>
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settings-panel" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleSettings()"></div>
        <div class="relative glass-panel p-8 rounded-[2.5rem] w-full max-w-xs space-y-6">
            <h3 class="text-xl font-black text-center">إعدادات اللعبة</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <span class="font-bold">المؤثرات الصوتية</span>
                    <input type="checkbox" id="set-sound" checked class="w-6 h-6 accent-indigo-500">
                </div>
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <span class="font-bold">الاهتزاز</span>
                    <input type="checkbox" id="set-vibrate" checked class="w-6 h-6 accent-indigo-500">
                </div>
            </div>
            <button onclick="toggleSettings()" class="w-full py-4 bg-indigo-600 rounded-2xl font-bold">حفظ</button>
        </div>
    </div>

    <script>
        // --- GAME ENGINE DATA ---
        const QUESTIONS = {
            l1: ["أكلة مستحيل تزهق منها؟", "لو بقيت شفاف هتعمل إيه؟", "أغرب موقف حصلك في المواصلات؟", "بلد تتمنى تعيش فيها؟", "لقب كنت بتكرهه وأنت صغير؟", "مين أكتر واحد رغاي فينا؟", "عادة غريبة بتعملها لوحدك؟", "لو بقيت بطل خارق قوتك إيه؟", "آخر حاجة دورت عليها في جوجل؟", "تحب تكون بطل ولا شرير في فيلم؟", "أبلكيشن بيسرق وقتك؟", "تعيش في غابة ولا صحراء؟", "أغرب حاجة اشتريتها وندمت؟", "كلمة بتقولها كتير في يومك؟", "لو صحيت لقيت معاك مليون جنيه؟", "موهبتك السرية إيه؟", "قهوة ولا شاي؟", "أكتر حاجة بتضحكك؟", "لو هتغير اسمك هتختار إيه؟", "أطول مدة قعدتها من غير نوم؟"],
            l2: ["صفة لو غيرتها هتكون أسعد؟", "قرار ندمت عليه جداً؟", "أكتر حاجة بتعصبك فوراً؟", "بتثق في الناس بسرعة؟", "موهبة كنت تتمنى تكون عندك؟", "لو رجع بيك الزمن هتغير كليتك؟", "مين الشخص اللي بتلجأله في المشاكل؟", "إيه أكبر فوبيا عندك؟", "عنوان كتاب عن حياتك؟", "نصيحة مستحيل تنساها؟", "محظوظ ولا منحوس؟", "حاجة مستحيل تسامح فيها؟", "بتهتم برأي الناس؟", "أكتر صفة بتجذبك في الناس؟", "تغير قانون واحد في بلدك؟", "بتعرف تقول 'لأ'؟", "مغامرة ولا روتين؟", "بتخبي مشاعرك؟", "أجرأ قرار أخدته؟", "بتسامح بسهولة؟"],
            l3: ["حقيقة بتهرب منها؟", "تعتذر لمين دلوقتى؟", "حلم ضاع ولسه مأثر فيك؟", "راضي عن نفسك بنسبة كام؟", "الناس فاهماك غلط في إيه؟", "آخر يوم هتقضيه مع مين؟", "إيه اللي بيحسسك بالضعف؟", "مين أمانك في الدنيا؟", "موقف غير نظرتك للحياة؟", "خزلت حد كان واثق فيك؟", "أكبر إنجاز عملته؟", "ذكرى عايز تمسحها للأبد؟", "سؤال كنت خايف حد يسأله؟", "أكبر سر خبيته عن أهلك؟", "عمرك حسيت إنك مظلوم؟", "إيه اللي بيخليك تعيط؟", "حياتك في كلمة واحدة؟", "شخص جرحك ومستحيل تنسى؟", "بتحب نفسك بجد؟", "لو هتموت بكرة إيه أكتر ندم؟"]
        };

        const DARES = ["اتصل بحد وقوله 'كسبت 50 ألف' 📞", "ارقص بلدي 30 ثانية 💃", "نط 15 مرة وصوت زي البطة 🦆", "سيلفي مضحك لجروب العيلة 🤳", "لهجة خليجي جولة كاملة 🇸🇦", "ارسم شنب على وشك 🖋️", "غني 'ستو أنا' بإحساس 🎤", "اعمل 10 ضغط حالاً 🏋️", "قلد صوت فنان مشهور 🎬", "امسح آخر صورة في الاستديو (حد يختارها) 🖼️"];

        // --- CORE STATE ---
        let players = [];
        let currentPlayerIdx = 0;
        let answeredIds = new Set();
        let isSpinning = false;
        let rotation = 0;
        let activeQ = null;
        let timerInt = null;
        let multiplier = 1;
        let shieldActive = false;

        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');

        // --- AUDIO ENGINE (Web Audio) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur, vol = 0.1) {
            if(!document.getElementById('set-sound').checked) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        const sounds = {
            tick: () => playTone(600, 'sine', 0.1, 0.05),
            win: () => { playTone(500, 'sine', 0.2); setTimeout(() => playTone(800, 'sine', 0.4), 100); },
            fail: () => { playTone(200, 'square', 0.3); playTone(150, 'square', 0.4); },
            timer: (f) => playTone(f, 'sine', 0.05, 0.03),
            drum: () => { for(let i=0; i<15; i++) setTimeout(()=>playTone(100+Math.random()*40, 'square', 0.1, 0.02), i*200); }
        };

        // --- FUNCTIONS ---
        function createStars() {
            const field = document.getElementById('star-field');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100 + '%';
                s.style.top = Math.random()*100 + '%';
                const size = Math.random()*3 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.setProperty('--d', (Math.random()*3 + 2) + 's');
                field.appendChild(s);
            }
        }

        function addInput() {
            const container = document.getElementById('player-list-setup');
            const idx = container.children.length + 1;
            const div = document.createElement('div');
            div.className = "flex gap-2 animate-fade-in";
            div.innerHTML = `<input type="text" placeholder="اسم اللاعب ${idx}" class="player-input w-full bg-slate-800/50 p-4 rounded-2xl border border-white/10 outline-none focus:border-indigo-500 font-bold text-center">`;
            container.appendChild(div);
        }

        function startGame() {
            const inputs = document.querySelectorAll('.player-input');
            const avatars = ['😎', '🦁', '👻', '🔥', '👑', '👽', '🐱', '🎮'];
            players = Array.from(inputs).map((i, idx) => ({
                name: i.value.trim() || `لاعب ${idx+1}`,
                avatar: avatars[idx % avatars.length],
                score: 0,
                streak: 0,
                powers: { double: true, shield: true }
            })).filter(p => p.name);

            if(players.length < 2) return alert("لازم 2 لاعيبة على الأقل يا وحش!");
            
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            updateUI();
            drawWheel();
        }

        function updateUI() {
            const container = document.getElementById('mini-leaderboard');
            container.innerHTML = '';
            players.forEach((p, idx) => {
                const active = idx === currentPlayerIdx;
                const card = document.createElement('div');
                card.className = `player-card min-w-[120px] p-4 rounded-2xl glass-panel flex flex-col items-center transition-all ${active ? 'active on-fire' : 'opacity-50 scale-90'}`;
                card.innerHTML = `
                    <div class="text-3xl">${p.avatar}</div>
                    <div class="text-xs font-black truncate max-w-full">${p.name}</div>
                    <div class="text-indigo-400 font-black">${p.score}ن</div>
                    ${p.streak >= 3 ? `<div class="text-[10px] text-orange-500 font-black">🔥 STREAK x${p.streak}</div>` : ''}
                `;
                container.appendChild(card);
            });
            document.getElementById('current-player-name').innerText = players[currentPlayerIdx].name;
        }

        function drawWheel() {
            const total = 60; // Fixed visual slices for game feel
            const angle = (2 * Math.PI) / total;
            const colors = ['#4f46e5', '#818cf8', '#6366f1', '#4338ca'];
            ctx.clearRect(0,0,800,800);
            for(let i=0; i<total; i++) {
                ctx.beginPath(); ctx.moveTo(400,400);
                ctx.arc(400,400,390, i*angle, (i+1)*angle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill(); ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
            }
        }

        function spinWheel() {
            if(isSpinning) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            sounds.drum();
            
            const extra = 1800 + Math.random()*1800;
            rotation += extra;
            canvas.style.transform = `rotate(${rotation}deg)`;

            let lastTick = 0;
            const tickInt = setInterval(() => {
                const current = (rotation * (Date.now() % 5000 / 5000)) % 360;
                if(Math.abs(current - lastTick) > 10) { sounds.tick(); lastTick = current; }
            }, 50);

            setTimeout(() => {
                clearInterval(tickInt);
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
                pickQuestion();
            }, 5000);
        }

        function pickQuestion() {
            // Pick based on probability or sequence
            const levels = ['l1', 'l2', 'l3'];
            const lvl = levels[Math.floor(Math.random()*3)];
            const qList = QUESTIONS[lvl];
            const qText = qList[Math.floor(Math.random()*qList.length)];
            const points = lvl === 'l1' ? 10 : (lvl === 'l2' ? 25 : 50);
            
            activeQ = { text: qText, points, level: parseInt(lvl[1]) };
            showQuestion();
        }

        function showQuestion() {
            multiplier = 1;
            shieldActive = false;
            const p = players[currentPlayerIdx];
            
            document.getElementById('q-text').innerText = activeQ.text;
            document.getElementById('q-points').innerText = `${activeQ.points}ن`;
            document.getElementById('p-double').disabled = !p.powers.double;
            document.getElementById('p-shield').disabled = !p.powers.shield;
            
            const overlay = document.getElementById('question-overlay');
            const card = document.getElementById('q-card');
            overlay.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-90'), 10);
            
            startTimer();
        }

        function startTimer() {
            let left = 30;
            const display = document.getElementById('q-timer');
            display.innerText = left;
            display.classList.remove('timer-shake');

            timerInt = setInterval(() => {
                left--;
                display.innerText = left;
                if(left <= 5) {
                    display.classList.add('timer-shake');
                    sounds.timer(1000 + (5-left)*200);
                    if(document.getElementById('set-vibrate').checked && navigator.vibrate) navigator.vibrate(100);
                }
                if(left <= 0) { clearInterval(timerInt); handleAction(false); }
            }, 1000);
        }

        function usePower(type) {
            const p = players[currentPlayerIdx];
            if(type === 'double' && p.powers.double) {
                p.powers.double = false;
                multiplier = 2;
                document.getElementById('q-points').innerText = `${activeQ.points * 2}ن (X2!)`;
                document.getElementById('p-double').disabled = true;
                confetti({ particleCount: 40, colors: ['#fbbf24'] });
            } else if(type === 'shield' && p.powers.shield) {
                p.powers.shield = false;
                shieldActive = true;
                document.getElementById('p-shield').disabled = true;
            }
        }

        function handleAction(success) {
            clearInterval(timerInt);
            const p = players[currentPlayerIdx];
            const overlay = document.getElementById('question-overlay');
            
            if(success) {
                p.streak++;
                let bonus = p.streak >= 3 ? p.streak * 5 : 0;
                const total = (activeQ.points * multiplier) + bonus;
                p.score += total;
                sounds.win();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                log(`✅ ${p.name} جاوب واخد ${total} نقطة!`);
                overlay.classList.add('hidden');
                nextTurn();
            } else {
                if(!shieldActive) {
                    p.score = Math.max(0, p.score - (activeQ.points * multiplier));
                    p.streak = 0;
                }
                sounds.fail();
                log(`❌ ${p.name} انسحب ${shieldActive ? '(الدرع حماه)' : ''}`);
                showDare();
            }
        }

        function showDare() {
            const dare = DARES[Math.floor(Math.random()*DARES.length)];
            document.getElementById('dare-text').innerText = dare;
            document.getElementById('modal-dare').classList.remove('hidden');
        }

        function closeDare() {
            document.getElementById('modal-dare').classList.add('hidden');
            document.getElementById('question-overlay').classList.add('hidden');
            nextTurn();
        }

        function nextTurn() {
            currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
            updateUI();
        }

        function log(m) {
            const l = document.getElementById('game-log');
            const d = document.createElement('div');
            d.innerText = m;
            l.prepend(d);
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('hidden');
        }

        function confirmEndGame() {
            if(confirm("ميداليات الأساطير مستنية.. ننهي اللعب دلوقت؟")) showFinal();
        }

        function showFinal() {
            const sorted = [...players].sort((a,b) => b.score - a.score);
            const container = document.getElementById('podium-area');
            const rankings = document.getElementById('other-rankings');
            container.innerHTML = ''; rankings.innerHTML = '';

            const order = [sorted[1], sorted[0], sorted[2]].filter(p => p);
            order.forEach(p => {
                const rank = p === sorted[0] ? 1 : (p === sorted[1] ? 2 : 3);
                const pillar = document.createElement('div');
                pillar.className = `podium-pillar pillar-${rank}`;
                pillar.innerHTML = `<div class="text-3xl">${p.avatar}</div><div class="text-[10px] truncate w-full px-1">${p.name}</div><div>#${rank}</div>`;
                container.appendChild(pillar);
            });

            sorted.slice(3).forEach((p, i) => {
                rankings.innerHTML += `<div class="flex justify-between p-3 glass-panel rounded-xl"><span>#${i+4} ${p.name}</span><span>${p.score}ن</span></div>`;
            });

            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-final').classList.remove('hidden');
            confetti({ particleCount: 500, spread: 160, origin: { y: 0.3 } });
        }

        window.onload = () => {
            createStars();
        };
    </script>
</body>
</html>

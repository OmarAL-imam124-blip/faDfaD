<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضفضة ULTIMATE - النسخة الأسطورية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-color: #6366f1;
            --s-color: #f43f5e;
            --g-color: #fbbf24;
            --bg-dark: #020617;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Cinematic Space Background */
        .universe-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: float-star var(--d) infinite linear;
        }
        @keyframes float-star {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        /* Professional Glass UI */
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Wheel Mastery */
        .wheel-outer {
            padding: 10px;
            background: linear-gradient(135deg, var(--p-color), #4338ca);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.4);
        }
        #wheel-canvas {
            transition: transform 6s cubic-bezier(0.15, 0, 0.05, 1);
        }

        /* Player Experience Glow */
        .lvl-up-glow {
            position: relative;
        }
        .lvl-up-glow::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 2rem;
            background: linear-gradient(45deg, var(--p-color), var(--s-color));
            z-index: -1;
            filter: blur(15px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .player-card.active::after { opacity: 0.6; }

        /* Ultimate Power Animation */
        .ultimate-ready {
            animation: ultimate-pulse 1s infinite alternate;
        }
        @keyframes ultimate-pulse {
            from { box-shadow: 0 0 10px var(--g-color); }
            to { box-shadow: 0 0 40px var(--g-color), 0 0 10px white; }
        }

        /* Utility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-action {
            background: linear-gradient(180deg, var(--p-color) 0%, #4338ca 100%);
            box-shadow: 0 6px 0 #312e81;
            transition: all 0.1s;
        }
        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #312e81;
        }
        .screen-shake { animation: shake 0.3s infinite; }
        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(3px,3px); }
            50% { transform: translate(-3px,-3px); }
            75% { transform: translate(3px,-3px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="universe-bg" id="star-field"></div>

    <!-- HUD (Heads Up Display) -->
    <header class="w-full max-w-5xl flex justify-between items-center z-20 p-6">
        <div class="flex gap-3">
            <button onclick="toggleSettings()" class="glass-card p-4 rounded-2xl hover:bg-white/10 transition text-2xl">⚙️</button>
            <div id="session-timer" class="glass-card px-5 py-3 rounded-2xl font-black text-indigo-400">00:00</div>
        </div>
        <div id="players-hud" class="flex gap-4 overflow-x-auto no-scrollbar py-2 px-4 glass-card rounded-[2.5rem] max-w-[70%]">
            <!-- Injected Players -->
        </div>
    </header>

    <!-- Settings Modal -->
    <div id="modal-settings" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center hidden p-4">
        <div class="relative glass-card p-8 rounded-[2.5rem] w-full max-w-xs space-y-6">
            <h3 class="text-xl font-black text-center">إعدادات اللعبة ⚙️</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                    <span class="font-bold text-sm">المؤثرات الصوتية</span>
                    <input type="checkbox" id="setting-sound" checked class="w-6 h-6 accent-indigo-500">
                </div>
            </div>
            <button onclick="toggleSettings()" class="btn-action w-full py-4 rounded-2xl font-bold">حفظ وإغلاق</button>
        </div>
    </div>

    <main id="app" class="w-full max-w-2xl flex-grow flex flex-col items-center justify-center z-10 p-4">
        
        <!-- INITIAL SETUP -->
        <div id="screen-setup" class="w-full text-center space-y-8 animate-fade-in">
            <div class="space-y-4">
                <h1 class="text-7xl md:text-8xl font-black text-white italic tracking-tighter drop-shadow-2xl">فضفضة <span class="text-indigo-500">ULTIMATE</span></h1>
                <p class="text-indigo-400 font-bold tracking-[0.3em] text-xs uppercase">أقوى نسخة في المجرة</p>
            </div>
            
            <div class="glass-card p-10 rounded-[3.5rem] space-y-6 w-full max-w-lg mx-auto border-white/5">
                <div class="space-y-4" id="setup-inputs">
                    <p class="text-gray-400 font-bold">مين الأساطير اللي داخلين المواجهة؟</p>
                    <div id="player-rows" class="space-y-4">
                        <!-- Dynamic Rows -->
                    </div>
                    <button onclick="addPlayerRow()" class="text-indigo-400 text-sm font-black hover:text-indigo-300 transition">+ ضيف بطل جديد</button>
                    <button onclick="startMission()" class="btn-action w-full py-6 rounded-[2.5rem] text-3xl font-black text-white mt-4">إبـدأ المهمة 🚀</button>
                </div>
            </div>
        </div>

        <!-- THE ARENA -->
        <div id="screen-arena" class="hidden w-full space-y-10 text-center">
            <div class="space-y-2">
                <div id="turn-txt" class="text-indigo-500 font-black text-sm uppercase tracking-widest">الدور دلوقتي على</div>
                <h2 id="active-player-name" class="text-6xl font-black text-white drop-shadow-2xl italic tracking-tight">...</h2>
            </div>

            <div class="relative flex justify-center py-6">
                <div class="wheel-outer shadow-2xl">
                    <canvas id="wheel-canvas" width="800" height="800" class="w-[320px] h-[320px] md:w-[450px] md:h-[450px] rounded-full"></canvas>
                </div>
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-12 h-14 bg-rose-500 z-30" style="clip-path: polygon(100% 0, 0 0, 50% 100%); filter: drop-shadow(0 5px 15px rgba(244,63,94,0.5));"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 glass-card rounded-full z-20 flex items-center justify-center font-black text-xl text-white border-2 border-indigo-400 shadow-2xl">GO</div>
            </div>

            <div class="flex flex-col items-center gap-6">
                <button id="spin-btn" onclick="spinToWin()" class="btn-action w-full max-w-md py-6 rounded-[2.5rem] text-3xl font-black shadow-2xl">لـف العجلة! 🎡</button>
                <div class="flex gap-4">
                    <button onclick="confirmEnd()" class="text-gray-500 text-xs font-bold hover:text-rose-400 transition">إعلان النتائج 🏆</button>
                </div>
            </div>

            <div class="glass-card p-5 rounded-3xl text-[10px] text-gray-400 font-bold h-24 overflow-y-auto no-scrollbar italic border-white/5" id="game-logs">
                <div class="text-indigo-400">أهلاً بيك في الساحة.. خليك صريح عشان تكسب!</div>
            </div>
        </div>

        <!-- TRUTH OVERLAY -->
        <div id="truth-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
            <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-3xl"></div>
            <div id="q-card" class="relative glass-card rounded-[4rem] p-10 md:p-14 w-full max-w-xl text-center space-y-10 scale-90 transition-all duration-500 border-white/10">
                
                <div id="q-timer" class="absolute -top-14 left-1/2 -translate-x-1/2 w-32 h-32 rounded-full bg-white text-slate-900 flex flex-col items-center justify-center shadow-2xl border-[10px] border-indigo-600">
                    <span id="timer-num" class="text-5xl font-black">30</span>
                    <span class="text-[8px] font-bold uppercase tracking-widest text-indigo-500">sec</span>
                </div>
                
                <div class="space-y-4 pt-10">
                    <div id="q-cat" class="inline-block px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 mb-2">الفئة: صراحة</div>
                    <p id="q-text" class="text-3xl md:text-5xl font-black leading-tight text-white drop-shadow-md">...</p>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="glass-card p-4 rounded-3xl border-white/5">
                        <p class="text-[8px] text-gray-500 uppercase">النقاط</p>
                        <p id="q-pts" class="text-2xl font-black text-yellow-400">50</p>
                    </div>
                    <div class="glass-card p-4 rounded-3xl border-white/5">
                        <p class="text-[8px] text-gray-500 uppercase">XP</p>
                        <p id="q-xp" class="text-2xl font-black text-emerald-400">+100</p>
                    </div>
                    <div id="ultimate-slot" class="glass-card p-4 rounded-3xl border-white/5 flex items-center justify-center text-2xl grayscale">💣</div>
                </div>

                <!-- Strategic Powers -->
                <div class="flex gap-4 justify-center">
                    <button onclick="activatePower('double')" id="p-x2" class="flex-1 py-4 rounded-2xl bg-amber-500/10 border border-amber-500/20 font-black text-xs hover:bg-amber-500/30 transition-all">⚡ دبل سكور</button>
                    <button onclick="activatePower('bomb')" id="p-bomb" class="flex-1 py-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 font-black text-xs hover:bg-rose-500/30 transition-all hidden">💣 قنبلة صراحة</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4">
                    <button onclick="resolve(true)" class="btn-action py-7 rounded-[2.5rem] text-3xl font-black bg-emerald-600 border-emerald-800 text-white shadow-emerald-500/20">صـريح ✅</button>
                    <button onclick="resolve(false)" class="py-4 rounded-[2rem] bg-white/5 border border-white/10 font-bold text-rose-400 hover:bg-white/10 transition">ههرب (عقاب) 👺</button>
                </div>
            </div>
        </div>

        <!-- PUNISHMENT MODAL -->
        <div id="modal-punish" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
            <div class="absolute inset-0 bg-rose-950/95 backdrop-blur-md"></div>
            <div class="glass-card p-12 rounded-[3.5rem] border-rose-500/40 max-w-md w-full text-center space-y-8 animate-fade-in">
                <div class="text-8xl animate-bounce">👺</div>
                <h3 class="text-4xl font-black text-rose-500 italic">عقاب الهروب!</h3>
                <p id="punish-txt" class="text-2xl font-bold italic leading-relaxed text-white px-4">...</p>
                <button onclick="closePunish()" class="btn-action w-full py-6 rounded-[2rem] bg-rose-600 border-rose-900 font-black text-2xl">تم التنفيذ 😭</button>
            </div>
        </div>

        <!-- THE PODIUM (END SCREEN) -->
        <div id="screen-end" class="hidden w-full space-y-12 animate-fade-in text-center">
            <h2 class="text-7xl font-black italic text-white drop-shadow-2xl">أساطير الصراحة 🏆</h2>
            <div class="glass-card p-10 rounded-[4rem] space-y-10 border-white/5">
                <div id="podium-display" class="flex items-end justify-center gap-6 h-72">
                    <!-- Dynamic Podium -->
                </div>
                <div id="final-leaderboard" class="space-y-4 pt-8 border-t border-white/10 max-h-60 overflow-y-auto no-scrollbar"></div>
                <button onclick="location.reload()" class="btn-action w-full py-7 rounded-[3rem] font-black text-2xl">مهمة جديدة 🔄</button>
            </div>
        </div>

    </main>

    <script>
        // --- ASSETS & CONFIG ---
        const EMOJIS = ['😎', '👻', '🔥', '👑', '👽', '🎮', '🐯', '🤖', '👾', '🚀', '🐱', '🃏'];
        const CATEGORIES = [
            { name: "صراحة نارية", color: "#f43f5e" },
            { name: "أسرار غامضة", color: "#8b5cf6" },
            { name: "ضحك وهزار", color: "#fbbf24" },
            { name: "شغل وحياة", color: "#3b82f6" }
        ];

        const QUESTIONS = {
            lvl1: ["أكلة مستحيل تزهق منها؟", "لو بقيت شفاف هتعمل إيه؟", "أكتر موقف محرج في المواصلات؟", "بلد تتمنى تعيش فيها؟", "لقب كنت بتكرهه وأنت صغير؟", "مين أكتر واحد رغاي فينا؟", "عادة غريبة بتعملها لوحدك؟", "لو بقيت بطل خارق قوتك إيه؟", "آخر حاجة دورت عليها في جوجل؟", "تحب تكون بطل ولا شرير في فيلم؟", "أبلكيشن بيسرق وقتك؟", "تعيش في غابة ولا صحراء؟", "أغرب حاجة اشتريتها وندمت؟", "كلمة بتقولها كتير في يومك؟", "لو صحيت لقيت معاك مليون جنيه؟", "موهبتك السرية إيه؟", "قهوة ولا شاي؟", "أكتر حاجة بتضحكك؟", "لو هتغير اسمك تختار إيه؟", "أطول مدة قعدتها من غير نوم؟"],
            lvl2: ["صفة لو غيرتها هتكون أسعد؟", "قرار ندمت عليه جداً؟", "أكتر حاجة بتعصبك فوراً؟", "بتثق في الناس بسرعة؟", "موهبة كنت تتمنى تكون عندك؟", "لو رجع بيك الزمن هتغير كليتك؟", "مين الشخص اللي بتلجأله في المشاكل؟", "إيه أكبر فوبيا عندك؟", "عنوان كتاب عن حياتك؟", "نصيحة مستحيل تنساها؟", "محظوظ ولا منحوس؟", "حاجة مستحيل تسامح فيها؟", "بتهتم برأي الناس؟", "أكتر صفة بتجذبك في الناس؟", "تغير قانون واحد في بلدك؟", "بتعرف تقول 'لأ'؟", "مغامرة ولا روتين؟", "بتخبي مشاعرك؟", "أجرأ قرار أخدته؟", "بتسامح بسهولة؟"],
            lvl3: ["حقيقة بتهرب منها بقالك فترة؟", "تعتذر لمين دلوقتى؟", "حلم ضاع ولسه مأثر فيك؟", "راضي عن نفسك بنسبة كام؟", "الناس فاهماك غلط في إيه؟", "آخر يوم هتقضيه مع مين؟", "إيه اللي بيحسسك بالضعف؟", "مين أمانك في الدنيا؟", "موقف غير نظرتك للحياة؟", "خزلت حد كان واثق فيك؟", "أكبر إنجاز عملته؟", "ذكرى عايز تمسحها للأبد؟", "سؤال كنت خايف حد يسأله؟", "أكبر سر خبيته عن أهلك؟", "عمرك حسيت إنك مظلوم؟", "إيه اللي بيخليك تعيط؟", "حياتك في كلمة واحدة؟", "شخص جرحك ومستحيل تنسى؟", "بتحب نفسك بجد؟", "لو هتموت بكرة إيه أكتر ندم؟"]
        };

        const PUNISHMENTS = ["اتصل بحد وقوله 'كسبت 50 ألف' 📞", "ارقص بلدي 30 ثانية 💃", "نط 15 مرة وصوت زي البطة 🦆", "سيلفي مضحك لجروب العيلة 🤳", "لهجة خليجي جولة كاملة 🇸🇦", "ارسم شنب على وشك 🖋️", "غني 'ستو أنا' بإحساس عالي 🎤", "اعمل 10 ضغط حالاً 🏋️", "قلد صوت فنان مشهور 🎬"];

        // --- GAME ENGINE STATE ---
        let players = [];
        let currentIdx = 0;
        let isSpinning = false;
        let rotation = 0;
        let currentQ = null;
        let timer = null;
        let multiplier = 1;
        let bombActive = false;
        let sessionStartTime = null;

        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, dur, vol = 0.1) {
            if(!document.getElementById('setting-sound').checked) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        const SFX = {
            tick: () => playSfx(600, 'sine', 0.1, 0.04),
            win: () => { playSfx(500, 'sine', 0.2); setTimeout(()=>playSfx(800, 'sine', 0.4), 100); },
            fail: () => { playSfx(200, 'square', 0.3); playSfx(150, 'square', 0.4); },
            timer: (f) => playSfx(f, 'sine', 0.05, 0.02),
            levelup: () => { playSfx(400, 'sine', 0.1); setTimeout(()=>playSfx(600, 'sine', 0.1), 100); setTimeout(()=>playSfx(900, 'sine', 0.3), 200); }
        };

        // --- CORE FUNCTIONS ---
        function createSpace() {
            const field = document.getElementById('star-field');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100 + '%';
                s.style.top = Math.random()*100 + '%';
                const size = Math.random()*3 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.setProperty('--d', (Math.random()*10 + 5) + 's');
                field.appendChild(s);
            }
        }

        function toggleSettings() {
            const modal = document.getElementById('modal-settings');
            modal.classList.toggle('hidden');
        }

        function addPlayerRow() {
            const container = document.getElementById('player-rows');
            const idx = container.children.length;
            const row = document.createElement('div');
            row.className = "flex flex-col gap-3 p-5 glass-card rounded-[2rem] animate-fade-in";
            row.innerHTML = `
                <div class="flex gap-2">
                    <select class="p-3 bg-white/5 rounded-xl text-2xl outline-none avatar-sel">
                        ${EMOJIS.map(e => `<option>${e}</option>`).join('')}
                    </select>
                    <input type="text" placeholder="اسم البطل ${idx+1}" class="name-input w-full bg-transparent border-b border-white/10 p-3 outline-none font-black text-center text-white">
                </div>
            `;
            container.appendChild(row);
        }

        function startMission() {
            const rows = document.querySelectorAll('#player-rows > div');
            players = Array.from(rows).map((row, i) => ({
                name: row.querySelector('.name-input').value.trim() || `بطل ${i+1}`,
                avatar: row.querySelector('.avatar-sel').value,
                score: 0,
                xp: 0,
                lvl: 1,
                streak: 0,
                ultimateCharge: 0,
                powers: { double: true }
            }));

            if(players.length < 2) return alert("لازم 2 لعيبة على الأقل يا أسطورة!");
            
            document.getElementById('screen-setup').classList.add('hidden');
            document.getElementById('screen-arena').classList.remove('hidden');
            sessionStartTime = Date.now();
            updateHUD();
            drawWheel();
            startSessionTimer();
        }

        function updateHUD() {
            const container = document.getElementById('players-hud');
            container.innerHTML = '';
            players.forEach((p, i) => {
                const active = i === currentIdx;
                const card = document.createElement('div');
                card.className = `player-card min-w-[140px] p-4 rounded-[2rem] glass-card flex flex-col items-center transition-all lvl-up-glow ${active ? 'active scale-110' : 'opacity-40 grayscale scale-90'}`;
                card.innerHTML = `
                    <div class="relative">
                        <span class="text-4xl">${p.avatar}</span>
                        <span class="absolute -top-2 -right-2 bg-indigo-600 text-[8px] px-1 rounded-full border border-white">Lvl ${p.lvl}</span>
                    </div>
                    <p class="text-[10px] font-black mt-1 text-white truncate w-full text-center">${p.name}</p>
                    <p class="text-xs font-black text-indigo-400">${p.score}ن</p>
                    <div class="w-full bg-white/5 h-1 mt-1 rounded-full overflow-hidden">
                        <div class="bg-indigo-500 h-full transition-all" style="width: ${p.xp % 500 / 5}%"></div>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('active-player-name').innerText = players[currentIdx].name;
        }

        function drawWheel() {
            const totalSlices = 24; 
            const angle = (2 * Math.PI) / totalSlices;
            ctx.clearRect(0,0,800,800);
            for(let i=0; i<totalSlices; i++) {
                ctx.beginPath(); ctx.moveTo(400,400);
                ctx.arc(400,400,390, i*angle, (i+1)*angle);
                const grd = ctx.createRadialGradient(400, 400, 100, 400, 400, 400);
                const cat = CATEGORIES[i % CATEGORIES.length];
                grd.addColorStop(0, "#ffffff11");
                grd.addColorStop(1, cat.color);
                ctx.fillStyle = grd;
                ctx.fill(); ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
            }
        }

        function spinToWin() {
            if(isSpinning) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            
            const extra = 2520 + Math.random()*2160; 
            rotation += extra;
            canvas.style.transform = `rotate(${rotation}deg)`;

            let lastTick = 0;
            const tickInt = setInterval(() => {
                const cur = (rotation * (Date.now() % 5000 / 5000)) % 360;
                if(Math.abs(cur - lastTick) > 15) { SFX.tick(); lastTick = cur; }
            }, 50);

            setTimeout(() => {
                clearInterval(tickInt);
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
                prepareQuestion();
            }, 6000);
        }

        function prepareQuestion() {
            const levels = ['lvl1', 'lvl2', 'lvl3'];
            const lvl = levels[Math.floor(Math.random()*3)];
            const qList = QUESTIONS[lvl];
            const q = qList[Math.floor(Math.random()*qList.length)];
            const pts = lvl === 'lvl1' ? 20 : (lvl === 'lvl2' ? 50 : 100);
            const cat = CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)];
            
            currentQ = { text: q, pts, xp: pts * 2, cat, level: parseInt(lvl[3]) };
            launchQuestion();
        }

        function launchQuestion() {
            multiplier = 1;
            bombActive = false;
            const p = players[currentIdx];
            
            document.getElementById('q-text').innerText = currentQ.text;
            document.getElementById('q-pts').innerText = currentQ.pts;
            document.getElementById('q-xp').innerText = `+${currentQ.xp}`;
            document.getElementById('q-cat').innerText = `الفئة: ${currentQ.cat.name}`;
            document.getElementById('q-cat').style.color = currentQ.cat.color;
            
            document.getElementById('p-x2').disabled = !p.powers.double;
            document.getElementById('p-bomb').classList.toggle('hidden', p.ultimateCharge < 100);
            document.getElementById('ultimate-slot').classList.toggle('ultimate-ready', p.ultimateCharge >= 100);
            document.getElementById('ultimate-slot').classList.toggle('grayscale', p.ultimateCharge < 100);
            
            const overlay = document.getElementById('truth-overlay');
            const card = document.getElementById('q-card');
            overlay.classList.remove('hidden');
            if(currentQ.level === 3) card.classList.add('on-fire');
            else card.classList.remove('on-fire');

            setTimeout(() => card.classList.remove('scale-90'), 50);
            startTimer();
        }

        function startTimer() {
            let left = 30;
            const display = document.getElementById('timer-num');
            display.innerText = left;
            document.body.classList.remove('screen-shake');

            timer = setInterval(() => {
                left--;
                display.innerText = left;
                if(left <= 5) {
                    SFX.timer(700 + (5-left)*200);
                    document.body.classList.add('screen-shake');
                }
                if(left <= 0) { clearInterval(timer); resolve(false); }
            }, 1000);
        }

        function activatePower(type) {
            const p = players[currentIdx];
            if(type === 'double') {
                p.powers.double = false;
                multiplier = 2;
                document.getElementById('q-pts').innerText = currentQ.pts * 2;
                document.getElementById('p-x2').disabled = true;
                confetti({ particleCount: 40, colors: ['#facc15'] });
            } else if(type === 'bomb') {
                p.ultimateCharge = 0;
                bombActive = true;
                document.getElementById('p-bomb').classList.add('hidden');
                confetti({ particleCount: 100, colors: ['#f43f5e'], spread: 100 });
            }
        }

        function resolve(success) {
            clearInterval(timer);
            document.body.classList.remove('screen-shake');
            const p = players[currentIdx];
            
            if(success) {
                const gainPts = currentQ.pts * multiplier;
                p.score += gainPts;
                p.xp += currentQ.xp;
                p.streak++;
                p.ultimateCharge = Math.min(100, p.ultimateCharge + 25);
                
                const newLvl = Math.floor(p.xp / 500) + 1;
                if(newLvl > p.lvl) {
                    p.lvl = newLvl;
                    SFX.levelup();
                    confetti({ particleCount: 200, colors: ['#6366f1', '#fbbf24'] });
                }

                SFX.win();
                confetti({ particleCount: 150, origin: { y: 0.7 } });
                log(`🚀 ${p.name} جاوب بطل! (+${gainPts}ن)`);
                
                hideQuestion();
                nextPlayer();
            } else {
                p.score = Math.max(0, p.score - (currentQ.pts / 2));
                p.streak = 0;
                p.ultimateCharge = Math.max(0, p.ultimateCharge - 10);
                SFX.fail();
                log(`👺 ${p.name} كش وانسحب!`);
                showPunishment();
            }
        }

        function showPunishment() {
            const p = PUNISHMENTS[Math.floor(Math.random()*PUNISHMENTS.length)];
            document.getElementById('punish-txt').innerText = p;
            document.getElementById('modal-punish').classList.remove('hidden');
        }

        function closePunish() {
            document.getElementById('modal-punish').classList.add('hidden');
            hideQuestion();
            nextPlayer();
        }

        function hideQuestion() {
            document.getElementById('truth-overlay').classList.add('hidden');
            document.getElementById('q-card').classList.add('scale-90');
        }

        function nextPlayer() {
            currentIdx = (currentIdx + 1) % players.length;
            updateHUD();
        }

        function log(m) {
            const l = document.getElementById('game-logs');
            const entry = document.createElement('div');
            entry.innerText = m;
            entry.className = "py-1 border-b border-white/5 animate-fade-in";
            l.prepend(entry);
        }

        function startSessionTimer() {
            setInterval(() => {
                const diff = Date.now() - sessionStartTime;
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('session-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function confirmEnd() {
            if(confirm("مستعد تعلن النتائج النهائية للأساطير؟")) showEnd();
        }

        function showEnd() {
            const sorted = [...players].sort((a,b) => b.score - a.score);
            const podium = document.getElementById('podium-display');
            const leaderboard = document.getElementById('final-leaderboard');
            podium.innerHTML = ''; leaderboard.innerHTML = '';

            const order = [sorted[1], sorted[0], sorted[2]].filter(p => p);
            order.forEach(p => {
                const rank = p === sorted[0] ? 1 : (p === sorted[1] ? 2 : 3);
                const pillar = document.createElement('div');
                pillar.className = `podium-item rank-${rank} animate-fade-in`;
                pillar.innerHTML = `
                    <div class="text-6xl mb-2">${p.avatar}</div>
                    <div class="text-[10px] font-black text-white truncate w-20 px-2">${p.name}</div>
                    <div class="podium-base">#${rank}</div>
                `;
                podium.appendChild(pillar);
            });

            sorted.forEach((p, i) => {
                leaderboard.innerHTML += `
                    <div class="flex justify-between items-center p-5 glass-card rounded-3xl border-white/5 animate-fade-in" style="animation-delay: ${i*0.1}s">
                        <span class="font-black text-white italic">#${i+1} ${p.avatar} ${p.name}</span>
                        <div class="text-right">
                            <p class="text-[8px] text-gray-500 uppercase">النقاط النهائية</p>
                            <span class="text-indigo-400 font-black">${p.score}ن</span>
                        </div>
                    </div>`;
            });

            document.getElementById('screen-arena').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            confetti({ particleCount: 800, spread: 200, origin: { y: 0.3 } });
        }

        window.onload = () => {
            createSpace();
            addPlayerRow(); addPlayerRow();
        };
    </script>
</body>
</html>
